<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>EGG MART 🥚</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fff8e6;
text-align:center;
}

header{
background:#ffc107;
padding:25px;
}

h1{
margin:0;
font-size:40px;
}

.location{
margin-top:5px;
font-size:18px;
}

.tagline{
margin-top:10px;
font-size:18px;
color:#444;
}

.container{
margin-top:40px;
}

.box{
background:white;
width:340px;
margin:auto;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
}

input,textarea{
width:90%;
padding:10px;
margin-top:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
margin-top:15px;
}

.buttons button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#ff9800;
color:white;
font-size:15px;
cursor:pointer;
}

.buttons button:hover{
background:#f57c00;
}

.price{
margin-top:15px;
font-size:22px;
color:green;
}

.order{
margin-top:20px;
padding:12px 25px;
font-size:18px;
background:#28a745;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

footer{
margin-top:40px;
background:#333;
color:white;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>EGG MART 🥚🐣</h1>

<div class="location">
Sariya Bazar, Medical College Road, Gorakhpur
</div>

<div class="tagline">
Best Quality Eggs | Trusted Supplier
</div>

</header>


<div class="container">

<div class="box">

<h2>Order Eggs</h2>

<p>Price: ₹5 per Egg</p>

<input type="text" id="name" placeholder="Your Name">

<input type="number" id="mobile" placeholder="Mobile Number">

<textarea id="address" placeholder="Delivery Address"></textarea>

<div class="buttons">

<button onclick="setQty(1)">1 Egg</button>

<button onclick="setQty(12)">12 Eggs</button>

<button onclick="setQty(1)">1 Tray </button>

</div>

<input type="number" id="qty" placeholder="Or Enter Custom Quantity">

<div class="price" id="total">
Total Price: ₹0
</div>

<button class="order" onclick="orderEggs()">Place Order</button>

</div>

</div>


<footer>

📞 Order on this number

<br><br>

6307479366
<br>
8400879638

<br><br>

EGG MART – Best Quality & Trusted Supplier 🥚

</footer>


<script>

let pricePerEgg = 7;

function setQty(q){

document.getElementById("qty").value = q;

calculate();

}

document.getElementById("qty").addEventListener("input", calculate);

function calculate(){

let qty = document.getElementById("qty").value;

let total = qty * pricePerEgg;

document.getElementById("total").innerHTML = "Total Price: ₹" + total;

}

function orderEggs(){

let name = document.getElementById("name").value;

let mobile = document.getElementById("mobile").value;

let address = document.getElementById("address").value;

let qty = document.getElementById("qty").value;

let total = qty * pricePerEgg;

let message =
"Egg Order%0A%0A"+
"Name: "+name+"%0A"+
"Mobile: "+mobile+"%0A"+
"Address: "+address+"%0A"+
"Egg Quantity: "+qty+"%0A"+
"Total Price: ₹"+total;

let phone = "916307479366";

window.open("https://wa.me/"+phone+"?text="+message);

}

</script>

</body>
</html>
