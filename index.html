<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGG MART 🥚</title>

<style>

body{
font-family: Arial;
margin:0;
background:#fff9f0;
text-align:center;
}

header{
background:#ffcc00;
padding:20px;
}

h1{
margin:0;
font-size:40px;
}

.location{
font-size:18px;
margin-top:5px;
}

.container{
margin-top:40px;
}

.box{
background:white;
width:300px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:80%;
padding:10px;
font-size:18px;
margin-top:10px;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
background:#ff9900;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#ff7700;
}

.price{
font-size:25px;
margin-top:20px;
color:green;
}

footer{
margin-top:40px;
background:#333;
color:white;
padding:20px;
}

</style>
</head>

<body>

<header>

<h1>EGG MART 🥚🐣</h1>

<div class="location">
Sariya Bazar, Medical College Road, Gorakhpur
</div>

</header>

<div class="container">

<div class="box">

<h2>Order Eggs</h2>

<p>Price: ₹7 per Egg</p>

<input type="number" id="qty" placeholder="Enter quantity">

<div class="price" id="total">
Total Price: ₹0
</div>

<button onclick="orderEggs()">Order Now</button>

</div>

</div>

<footer>

Order on this number 📞 <br><br>

8400879638 <br>
6307479366

</footer>

<script>

let pricePerEgg = 7;

document.getElementById("qty").addEventListener("input", function(){

let qty = this.value;

let total = qty * pricePerEgg;

document.getElementById("total").innerHTML = "Total Price: ₹" + total;

});

function orderEggs(){

let qty = document.getElementById("qty").value;

let total = qty * pricePerEgg;

let message = "Hello, I want to order " + qty + " eggs. Total price ₹" + total;

let phone = "918400879638";

window.open("https://wa.me/" + phone + "?text=" + message);

}

</script>

</body>
</html>
