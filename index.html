<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partap Egg Mart</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
text-align:center;
}

.header{
background:#ffc107;
padding:15px;
font-size:18px;
}

.container{
background:white;
max-width:400px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;
}

.qty-box{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
margin:10px;
}

.qty-box button{
padding:10px 20px;
font-size:20px;
background:#ff9800;
border:none;
color:white;
border-radius:6px;
}

.qty-box span{
font-size:22px;
font-weight:bold;
}

.price{
color:green;
font-size:22px;
margin:15px;
}

.order{
background:#28a745;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:6px;
}

.footer{
background:#333;
color:white;
padding:20px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="header">
Best Quality Eggs | Trusted Supplier
</div>

<div class="container">

<h2>Order Eggs</h2>

<p>Price: ₹5 per Egg</p>

<input type="text" placeholder="Your Name">

<input type="number" placeholder="Mobile Number">

<textarea placeholder="Delivery Address"></textarea>

<h3>Egg Quantity</h3>

<div class="qty-box">
<button onclick="changeEgg(-1)">-</button>
<span id="eggCount">0</span>
<button onclick="changeEgg(1)">+</button>
</div>

<h3>Tray Quantity</h3>

<div class="qty-box">
<button onclick="changeTray(-1)">-</button>
<span id="trayCount">0</span>
<button onclick="changeTray(1)">+</button>
</div>

<div class="price" id="total">
Total Price: ₹0
</div>

<button class="order">Place Order</button>

</div>

<div class="footer">
Order on this number <br><br>

6307479366 <br>
8400879638 <br><br>

EGG MART – Best Quality & Trusted Supplier 🥚
</div>

<script>

let eggPrice = 5;
let eggs = 0;
let trays = 0;

function changeEgg(val){

eggs += val;

if(eggs < 0){
eggs = 0;
}

document.getElementById("eggCount").innerText = eggs;

updatePrice();
}

function changeTray(val){

trays += val;

if(trays < 0){
trays = 0;
}

document.getElementById("trayCount").innerText = trays;

updatePrice();
}

function updatePrice(){

let trayEggs = trays * 30;

let totalEggs = eggs + trayEggs;

let total = totalEggs * eggPrice;

document.getElementById("total").innerText =
"Total Price: ₹" + total;

}

</script>

</body>
</html>
